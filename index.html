<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Noct's Homepages</title>
  <style>
    body {
      color: #FFF8DC;
      background-image: url("background.png");
      background-position: top;
      background-color: #380C64;
    }

    .Maintitle {
      text-align:center;
      border: solid;
      border-color: #40DB9D;
      border-width: thick;
      padding: 20px;
    }

    .list {
      text-align: center;
      font-size: 25px;
    }

    .Tetris {
      border: solid;
      border-width: thick;
      color: #47B9BC;
      font-size: 35px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      gap: 20px;
      max-width: 700px;
      margin: auto;
    }

    .text-area {
      text-align: left;
      font-size: 30px;
    }

    .Tetris img {
      width: 300px;
      height: auto;
    }

    .atag {
      color: #B0E0E6;
      font-size: 40px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .atag:hover {
      color: #410A79;
      letter-spacing: 2px;
      text-shadow: 0px 0px 6px #B0E0E6;
    }

    .creater {
      font-size: 15px;
      color: #B0E0E6;
      margin-top: 10px;
    }

    /* three.js */
    #webgl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      pointer-events: auto;
      z-index: 0;
    }

    .debug-hide {
      display: none;
    }

    #d-button-press {
      color: #3BB879;
    }
  </style>
</head>
<body>

  <canvas id="webgl"></canvas>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.142.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.142.0/examples/jsm/controls/OrbitControls.js";

    const canvas = document.getElementById("webgl");

    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 5);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const box = new THREE.Mesh(
      new THREE.BoxGeometry(2, 2, 2),
      new THREE.MeshStandardMaterial({ color: 0x7936C9 })
    );
    scene.add(box);

    box.position.set(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = false;

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    function toggleDebug() {
      document.getElementById("html-content").classList.toggle("debug-hide");
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "d") {
        toggleDebug();
      }
    });
  </script>

  <!-- main code -->
  <div id="html-content">
    <div class="Maintitle">
      <h1>WELCOME!!</h1>
      <p>This page is a site for showcasing things made by noct and various other content.</p>
    </div>
    <div class="list">
      <h1>I create program list</h1>
      <div class="Tetris">
        <div class="text-area">
          <p>Tetris!! Create By noct</p>
          <a class="atag" href="tetris.html">▶ PLAY NOW</a>
          <p class="creater">created by noct</p>
        </div>
        <img src="tetrisimage.png" alt="Tetris image">
      </div>
      <div id="d-button-press">
        <h3>Press "D" to enter the behind-the-cube focus mode.</h3>
      </div>
    </div>
  </div>
</body>
</html>
